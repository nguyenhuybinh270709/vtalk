<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VTALK Header</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-nav-bg: #1a2540;
        --color-nav-border: rgba(255, 255, 255, 0.08);
        --font-nav: "Inter", sans-serif;
      }
    </style>
    <script>
      tailwind.config = {
        important: true,
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#111827]">
    <!-- ===== HEADER ===== -->
    <header id="site-header" class="bg-[#1a2540] relative z-50">
      <!-- Desktop & Tablet (sm+): single bar layout -->
      <nav
        class="hidden sm:flex items-center justify-between px-6 lg:px-12 h-16 lg:h-20 border-b border-white/10"
      >
        <!-- Nav trái -->
        <ul id="nav-left" class="flex items-center gap-4 lg:gap-8"></ul>

        <!-- Logo giữa -->
        <a
          href="/"
          class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center"
        >
          <img
            src="./images/logo.png"
            alt="VTALK Logo"
            id="header-logo"
            class="h-12 lg:h-16 w-auto object-contain drop-shadow-[0_0_12px_rgba(234,88,12,0.5)]"
          />
        </a>

        <!-- Nav phải -->
        <ul id="nav-right" class="flex items-center gap-4 lg:gap-8"></ul>
      </nav>

      <!-- Mobile (<sm): hamburger + logo -->
      <div
        class="flex sm:hidden items-center justify-between px-4 h-14 border-b border-white/10"
      >
        <a href="/" class="flex items-center">
          <img
            src="./images/logo.png"
            alt="VTALK Logo"
            id="header-logo-mobile"
            class="h-10 w-auto object-contain drop-shadow-[0_0_10px_rgba(234,88,12,0.45)]"
          />
        </a>
        <!-- Nút mở menu mobile -->
        <button
          id="mobile-menu-btn"
          aria-label="Mở menu"
          class="text-white p-2"
        >
          <svg
            id="icon-open"
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <svg
            id="icon-close"
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 hidden"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Mobile dropdown menu -->
      <div
        id="mobile-menu"
        class="hidden sm:hidden bg-[#1a2540] border-t border-white/10"
      >
        <ul id="nav-mobile" class="flex flex-col py-2"></ul>
      </div>
    </header>

    <script>
      // ===== DATA – dễ fetch từ WP REST API / PHP =====
      // Cấu trúc: { label, href, side } — side: 'left' | 'right' | 'mobile-only'
      const navItems = [
        { label: "LIÊN HỆ", href: "/lien-he", side: "left" },
        { label: "ĐÀO TẠO INHOUSE", href: "/dao-tao-inhouse", side: "left" },
        { label: "THÚ VỊ", href: "/thu-vi", side: "left" },
        { label: "HỆ SINH THÁI", href: "/he-sinh-thai", side: "right" },
        { label: "KHÓA HỌC", href: "/khoa-hoc", side: "right" },
        { label: "VTALK", href: "/vtalk", side: "right" },
      ];

      // ===== Render desktop nav (split left / right) =====
      const navItemClass = [
        "text-white/90 hover:text-white",
        "text-xs lg:text-sm font-semibold tracking-widest uppercase",
        "whitespace-nowrap transition-colors duration-200",
        "relative after:absolute after:left-0 after:-bottom-1 after:h-px",
        "after:w-0 after:bg-orange-500 after:transition-all hover:after:w-full",
      ].join(" ");

      const leftEl = document.getElementById("nav-left");
      const rightEl = document.getElementById("nav-right");

      navItems.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${item.href}" class="${navItemClass}">${item.label}</a>`;
        if (item.side === "left") leftEl.appendChild(li);
        if (item.side === "right") rightEl.appendChild(li);
      });

      // ===== Render mobile nav (full list) =====
      const mobileNavEl = document.getElementById("nav-mobile");
      const mobileItemClass = [
        "block px-6 py-3 text-white/85 hover:text-white hover:bg-white/5",
        "text-sm font-semibold tracking-widest uppercase transition-colors duration-150",
      ].join(" ");

      navItems.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${item.href}" class="${mobileItemClass}">${item.label}</a>`;
        mobileNavEl.appendChild(li);
      });

      // ===== Toggle mobile menu =====
      const btn = document.getElementById("mobile-menu-btn");
      const menu = document.getElementById("mobile-menu");
      const iconOpen = document.getElementById("icon-open");
      const iconClose = document.getElementById("icon-close");

      btn.addEventListener("click", () => {
        const isOpen = !menu.classList.contains("hidden");
        menu.classList.toggle("hidden", isOpen);
        iconOpen.classList.toggle("hidden", !isOpen);
        iconClose.classList.toggle("hidden", isOpen);
      });

      // ===== Logo – thay bằng URL thực =====
      // PHP: echo get_custom_logo() hoặc wp_get_attachment_image_src(get_theme_mod('custom_logo'))
      const logoSrc = "./images/logo.png";
      // Fallback: giữ placeholder nếu không load được
    </script>
  </body>
</html>
